<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AirBnB Calendar Update</title>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="AirBnB Cal" />
<meta name="theme-color" content="#185FA5" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .cal-card { background: #fff; border-radius: 14px; border: 1px solid #e0e0e0; padding: 1.5rem; width: 100%; max-width: 480px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .cal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .cal-icon { width: 42px; height: 42px; border-radius: 10px; background: #E6F1FB; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
  .cal-title { font-size: 17px; font-weight: 600; color: #111; }
  .cal-sub { font-size: 13px; color: #666; margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: #f0f0f0; border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
  .tab-btn { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; border: none; border-radius: 7px; background: none; color: #666; cursor: pointer; transition: all 0.15s; }
  .tab-btn.active { background: #fff; color: #185FA5; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #111; background: #fff; outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus { border-color: #185FA5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .row2 .field { margin-bottom: 0; }
  .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .color-swatch { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 8px 4px; border-radius: 8px; border: 1.5px solid transparent; background: none; transition: background 0.1s; }
  .color-swatch:hover { background: #f5f5f5; }
  .color-swatch.selected { border-color: #333; background: #f0f0f0; }
  .swatch-dot { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; }
  .swatch-label { font-size: 11px; color: #666; text-align: center; line-height: 1.3; }
  .color-swatch.selected .swatch-label { color: #111; font-weight: 600; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  .btn-primary { width: 100%; padding: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; background: #185FA5; color: #fff; border: none; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-google { width: 100%; padding: 11px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; background: #fff; color: #333; border: 1px solid #ddd; transition: background 0.15s; }
  .btn-google:hover { background: #f8f8f8; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  .auth-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f5f5f5; border-radius: 8px; margin-bottom: 1.25rem; font-size: 13px; }
  .auth-bar-left { display: flex; align-items: center; gap: 8px; color: #444; }
  .auth-dot { width: 8px; height: 8px; border-radius: 50%; background: #33B679; flex-shrink: 0; }
  .signout-btn { font-size: 12px; color: #666; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
  .error { font-size: 12px; color: #c0392b; margin-top: 8px; display: none; }
  .error.show { display: block; }
  .success { font-size: 13px; color: #0B8043; background: #EAF3DE; border-radius: 8px; padding: 10px 14px; margin-top: 12px; display: none; align-items: center; gap: 8px; }
  .success.show { display: flex; }
  .signin-note { font-size: 13px; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }

  /* Events list */
  .events-list { display: flex; flex-direction: column; gap: 10px; }
  .event-item { border: 1px solid #eee; border-radius: 10px; padding: 12px; position: relative; }
  .event-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .event-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .event-title { font-size: 14px; font-weight: 600; color: #111; flex: 1; }
  .event-time { font-size: 12px; color: #666; }
  .event-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-edit { flex: 1; padding: 7px; font-size: 13px; font-weight: 500; border-radius: 7px; border: 1px solid #185FA5; background: #fff; color: #185FA5; cursor: pointer; }
  .btn-delete { flex: 1; padding: 7px; font-size: 13px; font-weight: 500; border-radius: 7px; border: 1px solid #e74c3c; background: #fff; color: #e74c3c; cursor: pointer; }
  .btn-edit:hover { background: #E6F1FB; }
  .btn-delete:hover { background: #fdf0f0; }
  .no-events { text-align: center; color: #999; font-size: 14px; padding: 2rem 0; }
  .events-loading { text-align: center; color: #999; font-size: 14px; padding: 2rem 0; }

  /* Edit modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer; }

  #signin-section { display: block; }
  #app-section { display: none; }
</style>
</head>
<body>
<div class="cal-card">
  <div class="cal-header">
    <div class="cal-icon">📅</div>
    <div>
      <div class="cal-title">AirBnB Calendar Update</div>
      <div class="cal-sub" id="signed-in-email">Manage your rental calendar</div>
    </div>
  </div>

  <!-- Sign in -->
  <div id="signin-section">
    <p class="signin-note">Sign in with Google to create and manage calendar events.</p>
    <button class="btn-google" id="signin-btn">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- App -->
  <div id="app-section">
    <div class="auth-bar">
      <div class="auth-bar-left">
        <div class="auth-dot"></div>
        <span id="user-email">Signed in</span>
      </div>
      <button class="signout-btn" id="signout-btn">Sign out</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-create" onclick="switchTab('create')">＋ Create</button>
      <button class="tab-btn" id="tab-events" onclick="switchTab('events')">📋 View Events</button>
    </div>

    <!-- Create Tab -->
    <div id="panel-create">
      <div class="field">
        <label for="cal-select">Calendar</label>
        <select id="cal-select"><option value="">Loading…</option></select>
      </div>
      <div class="field">
        <label for="evt-title">Event title</label>
        <input type="text" id="evt-title" placeholder="e.g. Unit 1 - Guest Name" />
      </div>
      <div class="row2">
        <div class="field">
          <label for="start-date">Start date</label>
          <input type="date" id="start-date" />
        </div>
        <div class="field">
          <label for="start-time">Start time</label>
          <input type="time" id="start-time" value="16:00" />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="end-date">End date</label>
          <input type="date" id="end-date" />
        </div>
        <div class="field">
          <label for="end-time">End time</label>
          <input type="time" id="end-time" value="11:00" />
        </div>
      </div>
      <div class="field">
        <label>Event color</label>
        <div class="color-grid" id="color-grid"></div>
      </div>
      <p id="err-msg" class="error"></p>
      <div id="success-msg" class="success">✅ <span id="success-text">Event created!</span></div>
      <div class="divider"></div>
      <button class="btn-primary" id="create-btn">＋ Create Event</button>
    </div>

    <!-- Events Tab -->
    <div id="panel-events" style="display:none;">
      <div class="field">
        <label for="view-date">Pick a date</label>
        <input type="date" id="view-date" />
      </div>
      <button class="btn-primary" id="fetch-events-btn" style="margin-bottom:1rem;">Search Events</button>
      <div id="events-list-container"><p class="no-events">Pick a date to see events.</p></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Edit Event</div>
    <div class="field">
      <label for="edit-title">Event title</label>
      <input type="text" id="edit-title" />
    </div>
    <div class="row2">
      <div class="field">
        <label for="edit-start-date">Start date</label>
        <input type="date" id="edit-start-date" />
      </div>
      <div class="field">
        <label for="edit-start-time">Start time</label>
        <input type="time" id="edit-start-time" />
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="edit-end-date">End date</label>
        <input type="date" id="edit-end-date" />
      </div>
      <div class="field">
        <label for="edit-end-time">End time</label>
        <input type="time" id="edit-end-time" />
      </div>
    </div>
    <div class="field">
      <label>Event color</label>
      <div class="color-grid" id="edit-color-grid"></div>
    </div>
    <p id="edit-err" class="error"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-primary" id="save-edit-btn" style="flex:1;">Save Changes</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '728955993941-6h688ivamnffnetqfuo3jd14riftnjmd.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly';
const REDIRECT_URI = 'https://Trevor-Davis.github.io/airbnbcalendarsync/';
const IS_STANDALONE = window.navigator.standalone === true;

const COLORS = [
  { name: 'Unit 1', id: '11', hex: '#D50000', prefix: 'Unit 1 - ' },
  { name: 'Unit 3', id: '2',  hex: '#33B679', prefix: 'Unit 3 - ' },
  { name: 'Unit 5', id: '3',  hex: '#8E24AA', prefix: 'Unit 5 - ' },
  { name: 'Unit 6', id: '5',  hex: '#F6BF26', prefix: 'Unit 6 - ' },
];
const COLOR_MAP = { '11': '#D50000', '2': '#33B679', '3': '#8E24AA', '5': '#F6BF26' };

let accessToken = null;
let selectedColorId = COLORS[0].id;
let editColorId = null;
let targetCalendarId = 'primary';
let editingEventId = null;

const titleInput = document.getElementById('evt-title');
const startDateEl = document.getElementById('start-date');
const endDateEl = document.getElementById('end-date');

function formatDate(d) { return d.toISOString().split('T')[0]; }

function setDefaultDates() {
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  if (!startDateEl.value) startDateEl.value = formatDate(today);
  if (!endDateEl.value) endDateEl.value = formatDate(tomorrow);
  document.getElementById('view-date').value = formatDate(today);
}

startDateEl.addEventListener('change', function() {
  if (this.value) {
    const next = new Date(this.value + 'T00:00:00');
    next.setDate(next.getDate() + 1);
    endDateEl.value = formatDate(next);
  }
});

function buildColorGrid(containerId, onSelect, initialId) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  COLORS.forEach((c) => {
    const btn = document.createElement('button');
    btn.className = 'color-swatch' + (c.id === initialId ? ' selected' : '');
    btn.setAttribute('aria-label', c.name);
    const dot = document.createElement('div');
    dot.className = 'swatch-dot';
    dot.style.background = c.hex;
    const lbl = document.createElement('span');
    lbl.className = 'swatch-label';
    lbl.textContent = c.name;
    btn.appendChild(dot);
    btn.appendChild(lbl);
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
      onSelect(c);
    });
    grid.appendChild(btn);
  });
}

buildColorGrid('color-grid', (c) => {
  selectedColorId = c.id;
  if (c.prefix) {
    titleInput.value = c.prefix;
    titleInput.focus();
    titleInput.setSelectionRange(titleInput.value.length, titleInput.value.length);
  }
}, COLORS[0].id);

setDefaultDates();

function switchTab(tab) {
  document.getElementById('panel-create').style.display = tab === 'create' ? 'block' : 'none';
  document.getElementById('panel-events').style.display = tab === 'events' ? 'block' : 'none';
  document.getElementById('tab-create').classList.toggle('active', tab === 'create');
  document.getElementById('tab-events').classList.toggle('active', tab === 'events');
}

function showApp(email) {
  document.getElementById('signin-section').style.display = 'none';
  document.getElementById('app-section').style.display = 'block';
  document.getElementById('user-email').textContent = email || 'Signed in';
}

function showSignin() {
  document.getElementById('signin-section').style.display = 'block';
  document.getElementById('app-section').style.display = 'none';
  accessToken = null;
}

document.getElementById('signout-btn').addEventListener('click', () => {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  showSignin();
});

function loadCalendarsAndShow() {
  Promise.all([
    fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } }).then(r => r.json()),
    fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=250', { headers: { Authorization: 'Bearer ' + accessToken } }).then(r => r.json())
  ]).then(([info, calList]) => {
    const calendars = (calList.items || []).sort((a,b) => a.summary.localeCompare(b.summary));
    const select = document.getElementById('cal-select');
    select.innerHTML = '';
    calendars.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.summary;
      if (c.summary === 'AirBnB Elmwood') { opt.selected = true; targetCalendarId = c.id; }
      select.appendChild(opt);
    });
    select.addEventListener('change', () => { targetCalendarId = select.value; });
    if (!targetCalendarId && calendars.length) targetCalendarId = calendars[0].id;
    showApp(info.email);
  }).catch(() => showApp());
}

function handleRedirectToken() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    accessToken = params.get('access_token');
    history.replaceState(null, '', REDIRECT_URI);
    if (accessToken) { loadCalendarsAndShow(); return true; }
  }
  return false;
}

function doRedirectAuth() {
  const params = new URLSearchParams({ client_id: CLIENT_ID, redirect_uri: REDIRECT_URI, response_type: 'token', scope: SCOPES, prompt: 'consent' });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function initTokenClient() {
  if (handleRedirectToken()) return;
  if (IS_STANDALONE) {
    document.getElementById('signin-btn').addEventListener('click', doRedirectAuth);
  } else {
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { alert('Sign-in failed: ' + resp.error); return; }
        accessToken = resp.access_token;
        loadCalendarsAndShow();
      }
    });
    document.getElementById('signin-btn').addEventListener('click', () => {
      tokenClient.requestAccessToken({ prompt: 'consent' });
    });
  }
}

function waitForGoogle() {
  if (typeof google !== 'undefined' && google.accounts) initTokenClient();
  else setTimeout(waitForGoogle, 200);
}
waitForGoogle();

// --- Create Event ---
function toISO(dateStr, timeStr) { return new Date(dateStr + 'T' + timeStr).toISOString(); }

document.getElementById('create-btn').addEventListener('click', async function() {
  document.getElementById('err-msg').classList.remove('show');
  document.getElementById('success-msg').classList.remove('show');
  const title = titleInput.value.trim();
  const startDate = startDateEl.value, startTime = document.getElementById('start-time').value;
  const endDate = endDateEl.value, endTime = document.getElementById('end-time').value;
  if (!title) { showErr('err-msg', 'Please enter an event title.'); return; }
  if (!startDate || !startTime) { showErr('err-msg', 'Please set a start date and time.'); return; }
  if (!endDate || !endTime) { showErr('err-msg', 'Please set an end date and time.'); return; }
  if (new Date(`${endDate}T${endTime}`) <= new Date(`${startDate}T${startTime}`)) { showErr('err-msg', 'End must be after start.'); return; }
  const btn = this; btn.disabled = true; btn.textContent = 'Creating…';
  const event = { summary: title, start: { dateTime: toISO(startDate, startTime), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }, end: { dateTime: toISO(endDate, endTime), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone } };
  if (selectedColorId) event.colorId = selectedColorId;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(targetCalendarId)}/events`, { method: 'POST', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(event) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Unknown error');
    document.getElementById('success-text').textContent = `"${data.summary}" added!`;
    document.getElementById('success-msg').classList.add('show');
    titleInput.value = '';
  } catch(e) { showErr('err-msg', 'Error: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '＋ Create Event'; }
});

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
}

// --- View Events ---
document.getElementById('fetch-events-btn').addEventListener('click', fetchEvents);

async function fetchEvents() {
  const date = document.getElementById('view-date').value;
  if (!date) return;
  const container = document.getElementById('events-list-container');
  container.innerHTML = '<p class="events-loading">Loading…</p>';
  const dayStart = new Date(date + 'T00:00:00').toISOString();
  const dayEnd = new Date(date + 'T23:59:59').toISOString();
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(targetCalendarId)}/events?timeMin=${dayStart}&timeMax=${dayEnd}&singleEvents=true&orderBy=startTime`, { headers: { Authorization: 'Bearer ' + accessToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Unknown error');
    const events = data.items || [];
    if (!events.length) { container.innerHTML = '<p class="no-events">No events found for this date.</p>'; return; }
    container.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'events-list';
    events.forEach(evt => {
      const color = COLOR_MAP[evt.colorId] || '#4285F4';
      const startDT = evt.start?.dateTime ? new Date(evt.start.dateTime) : null;
      const endDT = evt.end?.dateTime ? new Date(evt.end.dateTime) : null;
      const timeStr = startDT ? `${startDT.toLocaleDateString()} ${startDT.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} → ${endDT.toLocaleDateString()} ${endDT.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}` : 'All day';
      const item = document.createElement('div');
      item.className = 'event-item';
      item.innerHTML = `
        <div class="event-item-header">
          <div class="event-color-dot" style="background:${color}"></div>
          <div class="event-title">${evt.summary || '(No title)'}</div>
        </div>
        <div class="event-time">${timeStr}</div>
        <div class="event-actions">
          <button class="btn-edit" onclick="openEditModal('${evt.id}')">✏️ Edit</button>
          <button class="btn-delete" onclick="deleteEvent('${evt.id}', this)">🗑 Delete</button>
        </div>`;
      list.appendChild(item);
    });
    container.appendChild(list);
  } catch(e) { container.innerHTML = `<p class="no-events">Error: ${e.message}</p>`; }
}

// --- Delete ---
async function deleteEvent(eventId, btn) {
  if (!confirm('Delete this event?')) return;
  btn.textContent = 'Deleting…'; btn.disabled = true;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(targetCalendarId)}/events/${eventId}`, { method: 'DELETE', headers: { Authorization: 'Bearer ' + accessToken } });
    if (res.status === 204 || res.ok) { fetchEvents(); }
    else throw new Error('Delete failed');
  } catch(e) { alert('Error deleting: ' + e.message); btn.textContent = '🗑 Delete'; btn.disabled = false; }
}

// --- Edit ---
async function openEditModal(eventId) {
  editingEventId = eventId;
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(targetCalendarId)}/events/${eventId}`, { headers: { Authorization: 'Bearer ' + accessToken } });
    const evt = await res.json();
    document.getElementById('edit-title').value = evt.summary || '';
    const startDT = evt.start?.dateTime ? new Date(evt.start.dateTime) : null;
    const endDT = evt.end?.dateTime ? new Date(evt.end.dateTime) : null;
    if (startDT) {
      document.getElementById('edit-start-date').value = formatDate(startDT);
      document.getElementById('edit-start-time').value = startDT.toTimeString().slice(0,5);
    }
    if (endDT) {
      document.getElementById('edit-end-date').value = formatDate(endDT);
      document.getElementById('edit-end-time').value = endDT.toTimeString().slice(0,5);
    }
    editColorId = evt.colorId || COLORS[0].id;
    buildColorGrid('edit-color-grid', (c) => { editColorId = c.id; }, editColorId);
    document.getElementById('edit-modal').classList.add('show');
  } catch(e) { alert('Could not load event: ' + e.message); }
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('show');
  document.getElementById('edit-err').classList.remove('show');
  editingEventId = null;
}

document.getElementById('save-edit-btn').addEventListener('click', async function() {
  const title = document.getElementById('edit-title').value.trim();
  const startDate = document.getElementById('edit-start-date').value;
  const startTime = document.getElementById('edit-start-time').value;
  const endDate = document.getElementById('edit-end-date').value;
  const endTime = document.getElementById('edit-end-time').value;
  if (!title) { showErr('edit-err', 'Please enter a title.'); return; }
  if (new Date(`${endDate}T${endTime}`) <= new Date(`${startDate}T${startTime}`)) { showErr('edit-err', 'End must be after start.'); return; }
  const btn = this; btn.disabled = true; btn.textContent = 'Saving…';
  const event = { summary: title, colorId: editColorId, start: { dateTime: toISO(startDate, startTime), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }, end: { dateTime: toISO(endDate, endTime), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone } };
  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(targetCalendarId)}/events/${editingEventId}`, { method: 'PUT', headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(event) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Unknown error');
    closeEditModal();
    fetchEvents();
  } catch(e) { showErr('edit-err', 'Error: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
});
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/airbnbcalendarsync/sw.js').catch(() => {});
  });
}
