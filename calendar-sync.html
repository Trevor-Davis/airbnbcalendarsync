<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add to Google Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .cal-card { background: #fff; border-radius: 14px; border: 1px solid #e0e0e0; padding: 2rem; width: 100%; max-width: 480px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .cal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
  .cal-icon { width: 42px; height: 42px; border-radius: 10px; background: #E6F1FB; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
  .cal-title { font-size: 17px; font-weight: 600; color: #111; }
  .cal-sub { font-size: 13px; color: #666; margin-top: 2px; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500; }
  .field input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #111; background: #fff; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: #185FA5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .row2 .field { margin-bottom: 0; }
  .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .color-swatch { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 8px 4px; border-radius: 8px; border: 1.5px solid transparent; background: none; transition: background 0.1s; }
  .color-swatch:hover { background: #f5f5f5; }
  .color-swatch.selected { border-color: #333; background: #f0f0f0; }
  .swatch-dot { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; }
  .swatch-label { font-size: 11px; color: #666; text-align: center; line-height: 1.3; }
  .color-swatch.selected .swatch-label { color: #111; font-weight: 600; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
  .btn-primary { width: 100%; padding: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; background: #185FA5; color: #fff; border: none; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-google { width: 100%; padding: 11px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 8px; background: #fff; color: #333; border: 1px solid #ddd; transition: background 0.15s; }
  .btn-google:hover { background: #f8f8f8; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  .auth-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f5f5f5; border-radius: 8px; margin-bottom: 1.25rem; font-size: 13px; }
  .auth-bar-left { display: flex; align-items: center; gap: 8px; color: #444; }
  .auth-dot { width: 8px; height: 8px; border-radius: 50%; background: #33B679; flex-shrink: 0; }
  .signout-btn { font-size: 12px; color: #666; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
  .error { font-size: 12px; color: #c0392b; margin-top: 8px; display: none; }
  .error.show { display: block; }
  .success { font-size: 13px; color: #0B8043; background: #EAF3DE; border-radius: 8px; padding: 10px 14px; margin-top: 12px; display: none; align-items: center; gap: 8px; }
  .success.show { display: flex; }
  #form-section { display: none; }
  #signin-section { display: block; }
  .signin-note { font-size: 13px; color: #666; margin-bottom: 1.25rem; line-height: 1.5; }
</style>
</head>
<body>
<div class="cal-card">
  <div class="cal-header">
    <div class="cal-icon">📅</div>
    <div>
      <div class="cal-title">Add to Google Calendar</div>
      <div class="cal-sub">Create events with color directly</div>
    </div>
  </div>

  <div id="signin-section">
    <p class="signin-note">Sign in with Google to create calendar events with your chosen color applied automatically.</p>
    <button class="btn-google" id="signin-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </div>

  <div id="form-section">
    <div class="auth-bar">
      <div class="auth-bar-left">
        <div class="auth-dot"></div>
        <span id="signed-in-email">Signed in</span>
      </div>
      <button class="signout-btn" id="signout-btn">Sign out</button>
    </div>
    <div class="field">
      <label for="cal-select">Calendar</label>
      <select id="cal-select" style="width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; color:#111; background:#fff; outline:none;"><option value="">Loading calendars…</option></select>
    </div>

    <div class="field">
      <label for="evt-title">Event title</label>
      <input type="text" id="evt-title" placeholder="e.g. Team Standup" />
    </div>

    <div class="row2">
      <div class="field">
        <label for="start-date">Start date</label>
        <input type="date" id="start-date" />
      </div>
      <div class="field">
        <label for="start-time">Start time</label>
        <input type="time" id="start-time" value="16:00" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label for="end-date">End date</label>
        <input type="date" id="end-date" />
      </div>
      <div class="field">
        <label for="end-time">End time</label>
        <input type="time" id="end-time" value="11:00" />
      </div>
    </div>

    <div class="field">
      <label>Event color</label>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <p id="err-msg" class="error" role="alert"></p>
    <div id="success-msg" class="success" role="status">
      ✅ <span id="success-text">Event created!</span>
    </div>

    <div class="divider"></div>

    <button class="btn-primary" id="create-btn">
      ＋ Create Event
    </button>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '728955993941-6h688ivamnffnetqfuo3jd14riftnjmd.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly';

const COLORS = [
  { name: 'Unit 1',    id: '11', hex: '#D50000', prefix: 'Unit 1 - ' },
  { name: 'Unit 3',    id: '2',  hex: '#33B679', prefix: 'Unit 3 - ' },
  { name: 'Unit 5',    id: '3',  hex: '#8E24AA', prefix: 'Unit 5 - ' },
  { name: 'Unit 6',    id: '5',  hex: '#F6BF26', prefix: 'Unit 6 - ' },
];

let accessToken = null;
let selectedColorId = null;
let targetCalendarId = 'primary';
const titleInput = document.getElementById('evt-title');
const startDateEl = document.getElementById('start-date');
const endDateEl = document.getElementById('end-date');

function formatDate(d) { return d.toISOString().split('T')[0]; }

function setDefaultDates() {
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  if (!startDateEl.value) startDateEl.value = formatDate(today);
  if (!endDateEl.value) endDateEl.value = formatDate(tomorrow);
}

startDateEl.addEventListener('change', function() {
  if (this.value) {
    const next = new Date(this.value + 'T00:00:00');
    next.setDate(next.getDate() + 1);
    endDateEl.value = formatDate(next);
  }
});

setDefaultDates();

const grid = document.getElementById('color-grid');
COLORS.forEach((c, idx) => {
  const btn = document.createElement('button');
  btn.className = 'color-swatch' + (idx === 0 ? ' selected' : '');
  btn.setAttribute('aria-label', c.name);

  const dot = document.createElement('div');
  dot.className = 'swatch-dot';
  dot.style.background = c.hex;

  const lbl = document.createElement('span');
  lbl.className = 'swatch-label';
  lbl.textContent = c.name;

  btn.appendChild(dot);
  btn.appendChild(lbl);

  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    btn.classList.add('selected');
    selectedColorId = c.id;
    if (c.prefix) {
      titleInput.value = c.prefix;
      titleInput.focus();
      titleInput.setSelectionRange(titleInput.value.length, titleInput.value.length);
    }
  });

  grid.appendChild(btn);
});

function showForm(email) {
  document.getElementById('signin-section').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('signed-in-email').textContent = email || 'Signed in';
}

function showSignin() {
  document.getElementById('signin-section').style.display = 'block';
  document.getElementById('form-section').style.display = 'none';
  accessToken = null;
}

document.getElementById('signout-btn').addEventListener('click', () => {
  if (accessToken) google.accounts.oauth2.revoke(accessToken, () => {});
  showSignin();
});

function initTokenClient() {
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { alert('Sign-in failed: ' + resp.error); return; }
      accessToken = resp.access_token;
      Promise.all([
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } }).then(r => r.json()),
        fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=250', { headers: { Authorization: 'Bearer ' + accessToken } }).then(r => r.json())
      ]).then(([info, calList]) => {
        const calendars = (calList.items || []).sort((a,b) => a.summary.localeCompare(b.summary));
        const select = document.getElementById('cal-select');
        select.innerHTML = '';
        calendars.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.summary;
          if (c.summary === 'AirBnB Elmwood') {
            opt.selected = true;
            targetCalendarId = c.id;
          }
          select.appendChild(opt);
        });
        select.addEventListener('change', () => { targetCalendarId = select.value; });
        if (!targetCalendarId && calendars.length) targetCalendarId = calendars[0].id;
        showForm(info.email);
      }).catch((e) => { showForm(); });
    }
  });

  document.getElementById('signin-btn').addEventListener('click', () => {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  });
}

function waitForGoogle() {
  if (typeof google !== 'undefined' && google.accounts) {
    initTokenClient();
  } else {
    setTimeout(waitForGoogle, 200);
  }
}
waitForGoogle();

function showError(msg) {
  const err = document.getElementById('err-msg');
  err.textContent = msg;
  err.classList.add('show');
}

function clearMessages() {
  document.getElementById('err-msg').classList.remove('show');
  document.getElementById('success-msg').classList.remove('show');
}

function toISO(dateStr, timeStr) {
  return new Date(dateStr + 'T' + timeStr).toISOString();
}

document.getElementById('create-btn').addEventListener('click', async function() {
  clearMessages();
  const title = titleInput.value.trim();
  const startDate = startDateEl.value;
  const startTime = document.getElementById('start-time').value;
  const endDate = endDateEl.value;
  const endTime = document.getElementById('end-time').value;

  if (!title) { showError('Please enter an event title.'); return; }
  if (!startDate || !startTime) { showError('Please set a start date and time.'); return; }
  if (!endDate || !endTime) { showError('Please set an end date and time.'); return; }

  const startDT = new Date(`${startDate}T${startTime}`);
  const endDT = new Date(`${endDate}T${endTime}`);
  if (endDT <= startDT) { showError('End date/time must be after the start.'); return; }

  const btn = this;
  btn.disabled = true;
  btn.textContent = 'Creating…';

  const event = {
    summary: title,
    start: { dateTime: toISO(startDate, startTime), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
    end:   { dateTime: toISO(endDate, endTime),     timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
  };
  if (selectedColorId) event.colorId = selectedColorId;

  try {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(targetCalendarId)}/events`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(event)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Unknown error');

    document.getElementById('success-text').textContent = `"${data.summary}" added to your calendar!`;
    document.getElementById('success-msg').classList.add('show');
    titleInput.value = '';
  } catch (e) {
    showError('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '＋ Create Event';
  }
});
</script>
</body>
</html>
